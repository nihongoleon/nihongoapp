<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Nihongo – Fase 1 Estable</title>

  <style>
    body { font-family: Arial, sans-serif; background:#f4f6f8; padding:30px; }
    h1,h2 { margin-bottom:10px; }
    nav button { margin-right:6px; padding:6px 10px; }
    .card { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
    input { padding:6px; width:100%; margin-bottom:6px; }
    table { width:100%; border-collapse:collapse; margin-top:10px; }
    th,td { border:1px solid #ccc; padding:6px; text-align:left; }
    .hidden { display:none; }
  </style>
</head>

<body>

<h1>Nihongo App – Fase 1</h1>

<nav id="menu" class="hidden">
  <button onclick="mostrarDirectorio()">Directorio</button>
  <button onclick="mostrarAlta()">Alta Alumno</button>
  <button onclick="logout()">Salir</button>
</nav>

<div id="app"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  /* ===== FIREBASE ===== */
  const firebaseConfig = {
    apiKey: "AIzaSyAOcQAh7cYKhQ5EeOfmYJhzX40J-LD-nyI",
    authDomain: "nihongoapp-85125.firebaseapp.com",
    projectId: "nihongoapp-85125",
  };

  const fb = initializeApp(firebaseConfig);
  const db = getFirestore(fb);

  /* ===== ESTADO ===== */
  const appDiv = document.getElementById("app");
  const menu = document.getElementById("menu");

  const MAESTRO = { user: "admin", pass: "admin" };
  let alumnos = [];

  /* ===== INICIO ===== */
  mostrarLogin();

  /* ===== LOGIN ===== */
  window.mostrarLogin = function () {
    menu.classList.add("hidden");
    appDiv.innerHTML = `
      <h2>Login</h2>
      <input id="u" placeholder="Usuario">
      <input id="p" type="password" placeholder="Contraseña">
      <button onclick="login()">Entrar</button>
    `;
  };

  window.login = async function () {
    const u = document.getElementById("u").value.trim();
    const p = document.getElementById("p").value.trim();

    // Maestro
    if (u === MAESTRO.user && p === MAESTRO.pass) {
      menu.classList.remove("hidden");
      await cargarAlumnos();
      mostrarDirectorio();
      return;
    }

    // Alumno
    const snap = await getDoc(doc(db, "alumnos", u));
    if (snap.exists() && snap.data().pass === p) {
      mostrarAlumno(snap.data());
      return;
    }

    alert("Credenciales incorrectas");
  };

  window.logout = function () {
    mostrarLogin();
  };

  /* ===== DATA ===== */
  async function cargarAlumnos() {
    const snap = await getDocs(collection(db, "alumnos"));
    alumnos = snap.docs.map(d => d.data());
  }

  /* ===== DIRECTORIO ===== */
  window.mostrarDirectorio = function () {
    appDiv.innerHTML = `
      <div class="card">
        <h2>Directorio de Alumnos</h2>
        <table>
          <tr>
            <th>Nombre</th>
            <th>Usuario</th>
            <th>Nivel</th>
          </tr>
          ${alumnos.map(a => `
            <tr>
              <td>${a.nombre}</td>
              <td>${a.usuario}</td>
              <td>${a.nivel}</td>
            </tr>
          `).join("")}
        </table>
      </div>
    `;
  };

  /* ===== ALTA ===== */
  window.mostrarAlta = function () {
    appDiv.innerHTML = `
      <div class="card">
        <h2>Alta de Alumno</h2>
        <input id="ru" placeholder="Usuario">
        <input id="rp" placeholder="Contraseña">
        <input id="rn" placeholder="Nombre">
        <input id="rl" placeholder="Nivel">
        <button onclick="registrarAlumno()">Registrar</button>
      </div>
    `;
  };

  window.registrarAlumno = async function () {
    const alumno = {
      usuario: document.getElementById("ru").value.trim(),
      pass: document.getElementById("rp").value.trim(),
      nombre: document.getElementById("rn").value.trim(),
      nivel: document.getElementById("rl").value.trim(),
    };

    if (!alumno.usuario || !alumno.pass || !alumno.nombre) {
      alert("Completa todos los campos");
      return;
    }

    await setDoc(doc(db, "alumnos", alumno.usuario), alumno);
    await cargarAlumnos();
    mostrarDirectorio();
  };

  /* ===== PANEL ALUMNO ===== */
  function mostrarAlumno(a) {
    menu.classList.add("hidden");
    appDiv.innerHTML = `
      <div class="card">
        <h2>${a.nombre}</h2>
        <p>Usuario: ${a.usuario}</p>
        <p>Nivel: ${a.nivel}</p>
        <button onclick="logout()">Salir</button>
      </div>
    `;
  }
</script>

</body>
</html>
