<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nihongo Admin</title>

<!-- ✅ Chart.js CORRECTAMENTE CARGADO -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial, sans-serif; background:#f4f6f8; padding:30px; }
h1,h2 { margin-bottom:10px; }
nav button { margin-right:8px; padding:6px 10px; }
.card { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
input, button { padding:6px; margin-top:6px; width:100%; }
.ok { color:green; font-weight:bold; }
.bad { color:red; font-weight:bold; }
.hidden { display:none; }
</style>
</head>

<body>

<h1>Nihongo App</h1>

<nav id="menu" class="hidden">
  <button onclick="vista('alumnos')">Alumnos</button>
  <button onclick="vista('cobranza')">Cobranza</button>
  <button onclick="vista('agenda')">Agenda</button>
  <button onclick="vista('dashboard')">Dashboard</button>
  <button onclick="logout()">Salir</button>
</nav>

<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyAOcQAh7cYKhQ5EeOfmYJhzX40J-LD-nyI",
  authDomain: "nihongoapp-85125.firebaseapp.com",
  projectId: "nihongoapp-85125"
};
const fb = initializeApp(firebaseConfig);
const db = getFirestore(fb);

/* ESTADO */
const appDiv = document.getElementById("app");
const menu = document.getElementById("menu");
const MAESTRO = { user: "admin", pass: "admin" };
let alumnos = [];

/* UTILS */
function hoy(){ return new Date().toISOString().slice(0,10); }
function sumar30(){ const d=new Date(); d.setDate(d.getDate()+30); return d.toISOString().slice(0,10); }
function activo(f){ return new Date()<=new Date(f); }
function mesActual(f){ return f && f.startsWith(hoy().slice(0,7)); }

/* ARRANQUE */
mostrarLogin();

/* LOGIN */
function mostrarLogin(){
  menu.classList.add("hidden");
  appDiv.innerHTML = `
    <h2>Login</h2>
    <input id="u" placeholder="Usuario">
    <input id="p" type="password" placeholder="Contraseña">
    <button id="go">Entrar</button>
  `;
  document.getElementById("go").onclick = manejarLogin;
}

async function manejarLogin(){
  const user = document.getElementById("u").value.trim();
  const pass = document.getElementById("p").value.trim();

  if(user===MAESTRO.user && pass===MAESTRO.pass){
    menu.classList.remove("hidden");
    await cargarAlumnos();
    vista("dashboard");
    return;
  }

  const ref = doc(db,"alumnos",user);
  const snap = await getDoc(ref);
  if(!snap.exists() || snap.data().pass!==pass){
    alert("Credenciales incorrectas");
    return;
  }
  mostrarAlumno(snap.data());
}

window.logout = function(){
  mostrarLogin();
};

/* DATA */
async function cargarAlumnos(){
  const snap = await getDocs(collection(db,"alumnos"));
  alumnos = snap.docs.map(d=>d.data());
}

/* VISTAS */
window.vista = function(v){
  if(v==="alumnos"){
    appDiv.innerHTML = `
      <div class="card">
        <h3>Registrar Alumno</h3>
        <input id="ru" placeholder="Usuario">
        <input id="rp" placeholder="Contraseña">
        <input id="rn" placeholder="Nombre">
        <input id="rl" placeholder="Nivel">
        <button id="reg">Registrar</button>
      </div>
    `;
    document.getElementById("reg").onclick = registrarAlumno;
  }

  if(v==="cobranza"){
    appDiv.innerHTML="";
    alumnos.forEach(a=>{
      const d=document.createElement("div");
      d.className="card";
      d.innerHTML=`
        <b>${a.nombre}</b><br>
        Estado: ${activo(a.vencimiento)?'<span class=ok>Activo</span>':'<span class=bad>Suspendido</span>'}<br>
        Vence: ${a.vencimiento}
        <button class="pay">Registrar Pago</button>
      `;
      d.querySelector(".pay").onclick=async()=>{
        a.vencimiento=sumar30();
        a.pagos.push({fecha:hoy(),monto:1200});
        await setDoc(doc(db,"alumnos",a.usuario),a);
        await cargarAlumnos(); vista("cobranza");
      };
      appDiv.appendChild(d);
    });
  }

  if(v==="agenda"){
    appDiv.innerHTML="";
    alumnos.forEach(a=>{
      appDiv.innerHTML+=`
      <div class="card">
        <b>${a.nombre}</b><br>
        Grupo Teams: ${a.teams ? `<a href="${a.teams}" target="_xima clase: ${a.clase || "No asignada"}
      </div>`;
    });
  }

  if(v==="dashboard"){
    let ing=0, eg=0;
    alumnos.forEach(a=>a.pagos.forEach(p=>{ if(mesActual(p.fecha)) ing+=p.monto; }));
    const balance=ing-eg;

    appDiv.innerHTML=`
      <div class="card">
        <h2>Ingresos del mes: $${ing}</h2>
        <h2>Egresos del mes: $${eg}</h2>
        <h1 class="${balance>=0?'ok':'bad'}">Balance: $${balance}</h1>
        <canvas id="grafico" height="120"></canvas>
      </div>
    `;

    const ctx = document.getElementById("grafico").getContext("2d");
    new Chart(ctx,{
      type:"bar",
      data:{
        labels:["Ingresos","Egresos"],
        datasets:[{
          label:"Resumen mensual",
          data:[ing,eg],
          backgroundColor:["green","red"]
        }]
      }
    });
  }
}

/* REGISTRO */
async function registrarAlumno(){
  const a={
    usuario:document.getElementById("ru").value.trim(),
    pass:document.getElementById("rp").value.trim(),
    nombre:document.getElementById("rn").value.trim(),
    nivel:document.getElementById("rl").value.trim(),
    vencimiento:sumar30(),
    pagos:[],
    teams:"",
    clase:""
  };
  await setDoc(doc(db,"alumnos",a.usuario),a);
  await cargarAlumnos(); vista("alumnos");
}

/* PANEL ALUMNO */
function mostrarAlumno(a){
  menu.classList.add("hidden");
  appDiv.innerHTML=`
    <div class="card">
      <h2>${a.nombre}</h2>
      Estado: ${activo(a.vencimiento)?'<span class=ok>Activo</span>':'<span class=bad>Suspendido</span>'}<br>
      ${activo(a.vencimiento)?'':'<p class=bad>Cuenta suspendida por pagos pendientes</p>'}
      <button onclick="logout()">Salir</button>
    </div>
  `;
}
</script>

</body>
</html>
