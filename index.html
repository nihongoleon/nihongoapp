<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nihongo – Fase 4</title>

<style>
body { font-family: Arial, sans-serif; padding:30px; background:#f5f5f5; }
h1,h2 { margin-bottom:10px; }
nav { margin-bottom:15px; }
button { padding:6px 10px; margin-right:5px; }
input, select { padding:6px; width:100%; margin-bottom:6px; }
.card { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
table { width:100%; border-collapse:collapse; }
th, td { border:1px solid #ccc; padding:6px; }
.green { color:green; font-weight:bold; }
.red { color:red; font-weight:bold; }
.hidden { display:none; }
</style>
</head>

<body>

<h1>Nihongo App – Fase 4</h1>

<nav id="menu" class="hidden">
  <button id="btnDashboard">Dashboard</button>
  <button id="btnDir">Directorio</button>
  <button id="btnAlta">Alta Alumno</button>
  <button id="btnCuotas">Cuotas</button>
  <button id="btnCobranza">Cobranza</button>
  <button id="btnEgresos">Egresos</button>
  <button id="btnLogout">Salir</button>
</nav>

<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyAOcQAh7cYKhQ5EeOfmYJhzX40J-LD-nyI",
  authDomain: "nihongoapp-85125.firebaseapp.com",
  projectId: "nihongoapp-85125"
});
const db = firebase.firestore();

const app = document.getElementById("app");
const menu = document.getElementById("menu");

const MAESTRO = { user:"admin", pass:"admin" };
let alumnos=[], cuotas=[], egresos=[];

/* -------- SESION -------- */
document.addEventListener("DOMContentLoaded", init);

async function init(){
  await cargarTodo();
  const s = JSON.parse(localStorage.getItem("sesion"));
  if(s && s.tipo==="maestro"){
    menu.classList.remove("hidden");
    mostrarDashboard();
    return;
  }
  mostrarLogin();
}

function mostrarLogin(){
  menu.classList.add("hidden");
  app.innerHTML=`
    <h2>Login</h2>
    <input id="u" placeholder="Usuario">
    <input id="p" type="password" placeholder="Contraseña">
    <button id="btnLogin">Entrar</button>`;
  btnLogin.onclick = login;
}

async function login(){
  if(u.value==="admin" && p.value==="admin"){
    localStorage.setItem("sesion",JSON.stringify({tipo:"maestro"}));
    menu.classList.remove("hidden");
    mostrarDashboard();
  }
}

function logout(){
  localStorage.removeItem("sesion");
  location.reload();
}

/* -------- DATA -------- */
async function cargarTodo(){
  alumnos = (await db.collection("alumnos").get()).docs.map(d=>d.data());
  cuotas = (await db.collection("cuotas").get()).docs.map(d=>d.data());
  egresos = (await db.collection("egresos").get()).docs.map(d=>d.data());
}

/* -------- DASHBOARD -------- */
function mostrarDashboard(){
  const mes = new Date().toISOString().slice(0,7);
  let ingresos = 0, gastos = 0;

  alumnos.forEach(a=>{
    (a.pagos||[]).forEach(p=>{
      if(p.fecha.startsWith(mes)) ingresos+=p.monto;
    });
  });

  egresos.forEach(e=>{
    if(e.fecha.startsWith(mes)) gastos+=e.monto;
  });

  const balance = ingresos - gastos;

  app.innerHTML=`
    <div class="card">
      <h2>Dashboard Mensual</h2>
      <p>Ingresos: $${ingresos}</p>
      <p>Egresos: $${gastos}</p>
      <p class="${balance>=0?'green':'red'}">Balance: $${balance}</p>
      <canvas id="graf"></canvas>
    </div>`;

  new Chart(document.getElementById("graf"),{
    type:"bar",
    data:{
      labels:["Ingresos","Egresos"],
      datasets:[{data:[ingresos,gastos],backgroundColor:["green","red"]}]
    }
  });
}

/* -------- DIRECTORIO -------- */
function mostrarDirectorio(){
  app.innerHTML=`
    <div class="card">
      <h2>Directorio</h2>
      <table>
        <tr><th>Nombre</th><th>Usuario</th><th>Nivel</th></tr>
        ${alumnos.map(a=>`<tr><td>${a.nombre}</td><td>${a.usuario}</td><td>${a.nivel}</td></tr>`).join("")}
      </table>
    </div>`;
}

/* -------- ALTA -------- */
function mostrarAlta(){
  app.innerHTML=`
    <div class="card">
      <h2>Alta Alumno</h2>
      <input id="ru" placeholder="Usuario">
      <input id="rp" placeholder="Contraseña">
      <input id="rn" placeholder="Nombre">
      <input id="rl" placeholder="Nivel">
      <button id="btnReg">Registrar</button>`;
  btnReg.onclick = registrarAlumno;
}
async function registrarAlumno(){
  await db.collection("alumnos").doc(ru.value).set({
    usuario:ru.value, pass:rp.value,
    nombre:rn.value, nivel:rl.value, pagos:[]
  });
  await cargarTodo(); mostrarDirectorio();
}

/* -------- CUOTAS -------- */
function mostrarCuotas(){
  app.innerHTML=`
    <div class="card">
      <h2>Cuotas</h2>
      <input id="cn" placeholder="Nombre">
      <input id="cm" type="number" placeholder="Monto">
      <button id="btnQC">Agregar</button>
      <ul>${cuotas.map(c=>`<li>${c.nombre} - $${c.monto}</li>`).join("")}</ul>`;
  btnQC.onclick = async ()=>{
    await db.collection("cuotas").doc(cn.value).set({nombre:cn.value,monto:+cm.value});
    await cargarTodo(); mostrarCuotas();
  };
}

/* -------- COBRANZA -------- */
function mostrarCobranza(){
  app.innerHTML=alumnos.map(a=>`
    <div class="card">
      <b>${a.nombre}</b>
      <select id="c_${a.usuario}">
        ${cuotas.map(c=>`<option value="${c.monto}">${c.nombre}</option>`).join("")}
      </select>
      <button onclick="pagar('${a.usuario}')">Pagar</button>
    </div>`).join("");
}
async function pagar(u){
  const a = alumnos.find(x=>x.usuario===u);
  const monto = +document.getElementById("c_"+u).value;
  a.pagos.push({fecha:new Date().toISOString(),monto});
  await db.collection("alumnos").doc(u).set(a);
  await cargarTodo();
}

/* -------- EGRESOS -------- */
function mostrarEgresos(){
  app.innerHTML=`
    <div class="card">
      <h2>Egresos</h2>
      <input id="ce" placeholder="Concepto">
      <input id="me" type="number" placeholder="Monto">
      <button id="btnE">Registrar</button>
      <ul>${egresos.map(e=>`<li>${e.concepto}: $${e.monto}</li>`).join("")}</ul>`;
  btnE.onclick = async ()=>{
    await db.collection("egresos").add({concepto:ce.value,monto:+me.value,fecha:new Date().toISOString()});
    await cargarTodo(); mostrarEgresos();
  };
}

/* -------- MENU -------- */
btnDashboard.onclick = mostrarDashboard;
btnDir.onclick = mostrarDirectorio;
btnAlta.onclick = mostrarAlta;
btnCuotas.onclick = mostrarCuotas;
btnCobranza.onclick = mostrarCobranza;
btnEgresos.onclick = mostrarEgresos;
btnLogout.onclick = logout;
</script>

</body>
</html>
