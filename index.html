<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nihongo – Paso 5</title>

<style>
body { font-family: Arial, sans-serif; padding:30px; background:#f5f5f5; }
nav { margin-bottom:15px; }
button { padding:6px 10px; margin-right:6px; }
input, select { padding:6px; width:100%; margin-bottom:6px; }
.card { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; max-width:800px; }
table { width:100%; border-collapse:collapse; }
th, td { border:1px solid #ccc; padding:6px; }
.green { color:green; font-weight:bold; }
.red { color:red; font-weight:bold; }
.orange { color:#c47f00; font-weight:bold; }
.hidden { display:none; }
</style>
</head>

<body>

<h1>Nihongo App</h1>

<nav id="menu" class="hidden">
  <button id="btnDir">Directorio</button>
  <button id="btnAlta">Alta Alumno</button>
  <button id="btnMods">Modalidades</button>
  <button id="btnCob">Cobranza</button>
  <button id="btnOut">Salir</button>
</nav>

<div id="app"></div>

<!-- ✅ FIREBASE CORRECTO -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
/* ===== CONFIG ===== */
const PASO_ACTUAL = "5";

/* ===== FIREBASE ===== */
firebase.initializeApp({
  apiKey: "AIzaSyAOcQAh7cYKhQ5EeOfmYJhzX40J-LD-nyI",
  authDomain: "nihongoapp-85125.firebaseapp.com",
  projectId: "nihongoapp-85125"
});
const db = firebase.firestore();

/* ===== ESTADO ===== */
const app = document.getElementById("app");
const menu = document.getElementById("menu");

/* ===== ARRANQUE ===== */
mostrarLogin();

/* ===== LOGIN ===== */
function mostrarLogin(){
  menu.classList.add("hidden");
  app.innerHTML = `
    <div class="card">
      <h2>Login – Paso ${PASO_ACTUAL}</h2>
      <input id="u" placeholder="Usuario">
      <input id="p" type="password" placeholder="Contraseña">
      <button id="go">Entrar</button>
    </div>`;
  go.onclick = login;
}

function login(){
  if(u.value==="admin" && p.value==="admin"){
    menu.classList.remove("hidden");
    mostrarDirectorio();
  } else alert("Credenciales incorrectas");
}

btnOut.onclick = () => location.reload();

/* ===== UTILIDAD FECHAS ===== */
function sumarDias(fechaISO, dias){
  const f = new Date(fechaISO);
  f.setDate(f.getDate() + dias);
  return f;
}

/* ===== ESTATUS AUTOMÁTICO ===== */
function calcularEstatus(alumno, modalidad){
  if(!alumno.inicioCobro) return {txt:"Pendiente", cls:"orange"};

  const base = alumno.ultimoPago || alumno.inicioCobro;
  const vence = sumarDias(base, modalidad.recurrenciaDias);
  const hoy = new Date();

  if(hoy > vence) return {txt:"Adeudo", cls:"red"};
  return {txt:"Al corriente", cls:"green"};
}

/* ===== DIRECTORIO ===== */
async function mostrarDirectorio(){
  const alumnosSnap = await db.collection("alumnos").get();
  const modsSnap = await db.collection("modalidades").get();

  const alumnos = alumnosSnap.docs.map(d=>d.data());
  const mods = modsSnap.docs.map(d=>d.data());

  app.innerHTML = `
    <div class="card">
      <h2>Directorio</h2>
      <table>
        <tr>
          <th>Nombre</th>
          <th>Modalidad</th>
          <th>Estatus</th>
        </tr>
        ${alumnos.map(a=>{
          const m = mods.find(x=>x.id===a.modalidadId);
          const e = m ? calcularEstatus(a,m) : {txt:"-",cls:""};
          return `<tr>
            <td>${a.nombre}</td>
            <td>${m?m.nombre:"-"}</td>
            <td class="${e.cls}">${e.txt}</td>
          </tr>`;
        }).join("")}
      </table>
    </div>`;
}

/* ===== ALTA ALUMNO ===== */
async function mostrarAlta(){
  const snap = await db.collection("modalidades").get();
  const mods = snap.docs.map(d=>d.data());
  if(mods.length===0){ alert("Primero crea una modalidad"); return; }

  app.innerHTML = `
    <div class="card">
      <h2>Alta Alumno</h2>
      <input id="ru" placeholder="Usuario">
      <input id="rp" placeholder="Contraseña">
      <input id="rn" placeholder="Nombre">
      <select id="rm">
        ${mods.map(m=>`<option value="${m.id}">${m.nombre}</option>`).join("")}
      </select>
      <label>Inicio de cobro:</label>
      <input id="ri" type="date">
      <button id="reg">Registrar</button>
    </div>`;
  reg.onclick = registrarAlumno;
}

async function registrarAlumno(){
  await db.collection("alumnos").doc(ru.value).set({
    usuario:ru.value,
    pass:rp.value,
    nombre:rn.value,
    modalidadId:rm.value,
    inicioCobro:ri.value,
    ultimoPago:null
  });
  mostrarDirectorio();
}

/* ===== MODALIDADES ===== */
async function mostrarModalidades(){
  const snap = await db.collection("modalidades").get();
  const mods = snap.docs.map(d=>d.data());

  app.innerHTML = `
    <div class="card">
      <h2>Modalidades</h2>
      <input id="mn" placeholder="Nombre">
      <input id="mm" type="number" placeholder="Monto">
      <input id="mr" type="number" placeholder="Recurrencia (días)">
      <button id="add">Agregar</button>

      <h3>Existentes</h3>
      <ul>
        ${mods.map(m=>`<li>${m.nombre} – ${m.recurrenciaDias} días</li>`).join("")}
      </ul>
    </div>`;
  add.onclick = crearModalidad;
}

async function crearModalidad(){
  const id = mn.value.toLowerCase().replace(/\s+/g,"_");
  await db.collection("modalidades").doc(id).set({
    id, nombre:mn.value, monto:+mm.value, recurrenciaDias:+mr.value
  });
  mostrarModalidades();
}

/* ===== COBRANZA ===== */
async function mostrarCobranza(){
  const alumnosSnap = await db.collection("alumnos").get();
  const modsSnap = await db.collection("modalidades").get();
  const alumnos = alumnosSnap.docs.map(d=>d.data());
  const mods = modsSnap.docs.map(d=>d.data());

  app.innerHTML = `
    <div class="card">
      <h2>Cobranza</h2>
      ${alumnos.map(a=>{
        const m = mods.find(x=>x.id===a.modalidadId);
        const e = m ? calcularEstatus(a,m) : {txt:"-",cls:""};
        return `<div class="card">
          <b>${a.nombre}</b><br>
          <span class="${e.cls}">${e.txt}</span><br><br>
          <button onclick="registrarPago('${a.usuario}')">Registrar pago</button>
        </div>`;
      }).join("")}
    </div>`;
}

async function registrarPago(usuario){
  await db.collection("alumnos").doc(usuario).update({
    ultimoPago: new Date().toISOString().substring(0,10)
  });
  mostrarCobranza();
}

/* ===== MENU ===== */
btnDir.onclick = mostrarDirectorio;
btnAlta.onclick = mostrarAlta;
btnMods.onclick = mostrarModalidades;
btnCob.onclick = mostrarCobranza;
</script>

</body>
</html>
