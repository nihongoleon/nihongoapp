<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nihongo – Fase 4.6</title>

<style>
body { font-family: Arial, sans-serif; padding:30px; background:#f5f5f5; }
h1,h2,h3 { margin-bottom:10px; }
nav { margin-bottom:15px; }
button { padding:6px 10px; margin-right:5px; }
input, select { padding:6px; width:100%; margin-bottom:6px; }
.card { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
table { width:100%; border-collapse:collapse; }
th, td { border:1px solid #ccc; padding:6px; }
.green { color:green; font-weight:bold; }
.red { color:red; font-weight:bold; }
.hidden { display:none; }
</style>
</head>

<body>

<h1>Nihongo App – Fase 4.6</h1>

<nav id="menu" class="hidden">
  <button id="btnDashboard">Dashboard</button>
  <button id="btnDir">Directorio</button>
  <button id="btnAlta">Alta Alumno</button>
  <button id="btnCuotas">Cuotas</button>
  <button id="btnCobranza">Cobranza</button>
  <button id="btnEgresos">Egresos</button>
  <button id="btnLogout">Salir</button>
</nav>

<div id="app"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyAOcQAh7cYKhQ5EeOfmYJhzX40J-LD-nyI",
  authDomain: "nihongoapp-85125.firebaseapp.com",
  projectId: "nihongoapp-85125"
});
const db = firebase.firestore();

const app = document.getElementById("app");
const menu = document.getElementById("menu");
const MAESTRO = { user:"admin", pass:"admin" };

let alumnos=[], cuotas=[], egresos=[];

document.addEventListener("DOMContentLoaded", init);

async function init(){
  await cargarTodo();
  const s = JSON.parse(localStorage.getItem("sesion"));
  if(s?.tipo==="maestro"){
    menu.classList.remove("hidden");
    mostrarDashboard();
    return;
  }
  if(s?.tipo==="alumno"){
    const a = alumnos.find(x=>x.usuario===s.usuario);
    if(a){ mostrarAlumno(a); return; }
  }
  mostrarLogin();
}

/* LOGIN */
function mostrarLogin(){
  menu.classList.add("hidden");
  app.innerHTML=`
    <h2>Login</h2>
    <input id="u" placeholder="Usuario">
    <input id="p" type="password" placeholder="Contraseña">
    <button id="btnLogin">Entrar</button>`;
  btnLogin.onclick = login;
}

async function login(){
  if(u.value==="admin" && p.value==="admin"){
    localStorage.setItem("sesion",JSON.stringify({tipo:"maestro"}));
    menu.classList.remove("hidden");
    mostrarDashboard();
    return;
  }
  const snap = await db.collection("alumnos").doc(u.value).get();
  if(snap.exists && snap.data().pass===p.value){
    localStorage.setItem("sesion",JSON.stringify({tipo:"alumno",usuario:u.value}));
    mostrarAlumno(snap.data());
    return;
  }
  alert("Credenciales incorrectas");
}

function logout(){
  localStorage.removeItem("sesion");
  location.reload();
}

/* DATA */
async function cargarTodo(){
  alumnos = (await db.collection("alumnos").get()).docs.map(d=>d.data());
  cuotas  = (await db.collection("cuotas").get()).docs.map(d=>d.data());
  egresos = (await db.collection("egresos").get()).docs.map(d=>d.data());
}

/* UTIL */
function calcularEstatus(a){
  const cuota = cuotas.find(c=>c.id===a.cuotaId);
  if(!cuota) return "Adeudo";
  if(cuota.tipo==="unica") return "Al corriente";
  if(!a.ultimoPago) return "Adeudo";
  const venc = new Date(a.ultimoPago);
  venc.setDate(venc.getDate()+cuota.recurrenciaDias);
  return new Date()<=venc ? "Al corriente" : "Adeudo";
}

/* DASHBOARD */
function mostrarDashboard(){
  const mes = new Date().toISOString().slice(0,7);
  let ingresos=0, gastos=0;
  alumnos.forEach(a=>{
    (a.pagos||[]).forEach(p=>{
      if(p.fecha.startsWith(mes)) ingresos+=p.monto;
    });
  });
  egresos.forEach(e=>{
    if(e.fecha.startsWith(mes)) gastos+=e.monto;
  });
  app.innerHTML=`
    <div class="card">
      <h2>Dashboard</h2>
      <p>Ingresos: $${ingresos}</p>
      <p>Egresos: $${gastos}</p>
      <p class="${ingresos-gastos>=0?'green':'red'}">Balance: $${ingresos-gastos}</p>
      <canvas id="graf"></canvas>
    </div>`;
  new Chart(graf,{
    type:"bar",
    data:{labels:["Ingresos","Egresos"],datasets:[{data:[ingresos,gastos],backgroundColor:["green","red"]}]}
  });
}

/* DIRECTORIO */
function mostrarDirectorio(){
  app.innerHTML=`
    <div class="card">
      <h2>Directorio</h2>
      <table>
      <tr><th>Alumno</th><th>Plan</th><th>Estatus</th></tr>
      ${alumnos.map(a=>{
        const est=calcularEstatus(a);
        return `<tr>
          <td>${a.nombre}</td>
          <td>${cuotas.find(c=>c.id===a.cuotaId)?.nombre||""}</td>
          <td class="${est==='Al corriente'?'green':'red'}">${est}</td>
        </tr>`;
      }).join("")}
      </table>
    </div>`;
}

/* ALTA */
function mostrarAlta(){
  app.innerHTML=`
    <div class="card">
      <h2>Alta Alumno</h2>
      <input id="ru" placeholder="Usuario">
      <input id="rp" placeholder="Contraseña">
      <input id="rn" placeholder="Nombre">
      <input id="rl" placeholder="Nivel">
      <select id="rc">${cuotas.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join("")}</select>
      <button id="btnReg">Registrar</button>`;
  btnReg.onclick = registrarAlumno;
}

async function registrarAlumno(){
  await db.collection("alumnos").doc(ru.value).set({
    usuario:ru.value,
    pass:rp.value,
    nombre:rn.value,
    nivel:rl.value,
    cuotaId:rc.value,
    pagos:[]
  });
  await cargarTodo(); mostrarDirectorio();
}

/* CUOTAS */
function mostrarCuotas(){
  app.innerHTML=`
    <div class="card">
      <h2>Cuotas</h2>
      <input id="cn" placeholder="Nombre">
      <input id="cm" type="number" placeholder="Monto">
      <select id="ct">
        <option value="recurrente">Recurrente</option>
        <option value="unica">Única</option>
      </select>
      <input id="cr" type="number" placeholder="Recurrencia días (0 si única)">
      <button id="btnQC">Agregar</button>
      <ul>${cuotas.map(c=>`<li>${c.nombre} (${c.tipo})</li>`).join("")}</ul>`;
  btnQC.onclick = registrarCuota;
}
async function registrarCuota(){
  const id = cn.value.toLowerCase().replace(/\s+/g,"_");
  await db.collection("cuotas").doc(id).set({
    id, nombre:cn.value, monto:+cm.value,
    tipo:ct.value, recurrenciaDias:+cr.value
  });
  await cargarTodo(); mostrarCuotas();
}

/* COBRANZA */
function mostrarCobranza(){
  app.innerHTML=alumnos.map(a=>{
    const est=calcularEstatus(a);
    return `
      <div class="card">
        <b>${a.nombre}</b>
        <p class="${est==='Al corriente'?'green':'red'}">${est}</p>
        <button onclick="pagar('${a.usuario}')">Registrar pago</button>
      </div>`;
  }).join("");
}

async function pagar(u){
  const a = alumnos.find(x=>x.usuario===u);
  const cuota = cuotas.find(c=>c.id===a.cuotaId);
  a.pagos.push({fecha:new Date().toISOString(),monto:cuota.monto});
  a.ultimoPago = new Date().toISOString();
  await db.collection("alumnos").doc(u).set(a);
  await cargarTodo(); mostrarCobranza();
}

/* EGRESOS */
function mostrarEgresos(){
  app.innerHTML=`
    <div class="card">
      <h2>Egresos</h2>
      <input id="ce" placeholder="Concepto">
      <input id="me" type="number" placeholder="Monto">
      <button id="btnE">Registrar</button>
      <ul>${egresos.map(e=>`<li>${e.concepto} $${e.monto}</li>`).join("")}</ul>`;
  btnE.onclick = async ()=>{
    await db.collection("egresos").add({concepto:ce.value,monto:+me.value,fecha:new Date().toISOString()});
    await cargarTodo(); mostrarEgresos();
  };
}

/* PERFIL ALUMNO */
function mostrarAlumno(a){
  const est=calcularEstatus(a);
  const cuota=cuotas.find(c=>c.id===a.cuotaId);
  let venc="—";
  if(cuota?.tipo==="recurrente" && a.ultimoPago){
    const d=new Date(a.ultimoPago); d.setDate(d.getDate()+cuota.recurrenciaDias); venc=d.toLocaleDateString();
  }
  menu.classList.add("hidden");
  app.innerHTML=`
    <div class="card">
      <h2>${a.nombre}</h2>
      <p>Plan: ${cuota?.nombre}</p>
      <p>Estatus: <b class="${est==='Al corriente'?'green':'red'}">${est}</b></p>
      <p>Próximo pago: ${venc}</p>
      <p>Pagos: ${(a.pagos||[]).length}</p>
      <button id="btnSalirAlumno">Salir</button>`;
  btnSalirAlumno.onclick = logout;
}

/* MENU */
btnDashboard.onclick = mostrarDashboard;
btnDir.onclick = mostrarDirectorio;
btnAlta.onclick = mostrarAlta;
btnCuotas.onclick = mostrarCuotas;
btnCobranza.onclick = mostrarCobranza;
btnEgresos.onclick = mostrarEgresos;
btnLogout.onclick = logout;
</script>

</body>
</html>
