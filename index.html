<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Firebase OK</title>
</head>

<body>

<h1>Firebase OK</h1>
<div id="out">Cargando…</div>

<!-- ✅ FIREBASE BIEN CARGADO (AMBOS SCRIPTS) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
  console.log("JS cargó");

  // Inicializa Firebase
  firebase.initializeApp({
    apiKey: "AIzaSyAOcQAh7cYKhQ5EeOfmYJhzX40J-LD-nyI",
    authDomain: "nihongoapp-85125.firebaseapp.com",
    projectId: "nihongoapp-85125"
  });

  // Inicializa Firestore
  const db = firebase.firestore();

  // Prueba real de Firestore
  db.collection("alumnos").limit(1).get()
    .then(() => {
      document.getElementById("out").innerHTML =
        "✅ Firebase App + Firestore FUNCIONAN";
    })
    .catch(err => {
      document.getElementById("out").innerHTML =
        "❌ Error Firestore: " + err.message;
      console.error(err);
    });
</script>

</body>
</html>
