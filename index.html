<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nihongo – Fase 4.5</title>

<style>
body { font-family: Arial, sans-serif; padding:30px; background:#f5f5f5; }
h1,h2,h3 { margin-bottom:10px; }
nav { margin-bottom:15px; }
button { padding:6px 10px; margin-right:5px; }
input, select { padding:6px; width:100%; margin-bottom:6px; }
.card { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
table { width:100%; border-collapse:collapse; }
th, td { border:1px solid #ccc; padding:6px; }
.green { color:green; font-weight:bold; }
.red { color:red; font-weight:bold; }
.hidden { display:none; }
</style>
</head>

<body>

<h1>Nihongo App – Fase 4.5</h1>

<nav id="menu" class="hidden">
  <button id="btnDashboard">Dashboard</button>
  <button id="btnDir">Directorio</button>
  <button id="btnAlta">Alta Alumno</button>
  <button id="btnCuotas">Cuotas</button>
  <button id="btnCobranza">Cobranza</button>
  <button id="btnLogout">Salir</button>
</nav>

<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyAOcQAh7cYKhQ5EeOfmYJhzX40J-LD-nyI",
  authDomain: "nihongoapp-85125.firebaseapp.com",
  projectId: "nihongoapp-85125"
});
const db = firebase.firestore();

const app = document.getElementById("app");
const menu = document.getElementById("menu");
const MAESTRO = { user:"admin", pass:"admin" };

let alumnos=[], cuotas=[], egresos=[];

document.addEventListener("DOMContentLoaded", init);

async function init(){
  await cargarTodo();
  const sesion = JSON.parse(localStorage.getItem("sesion"));
  if(sesion){
    if(sesion.tipo==="maestro"){
      menu.classList.remove("hidden");
      mostrarDashboard();
      return;
    }
    if(sesion.tipo==="alumno"){
      const a = alumnos.find(x=>x.usuario===sesion.usuario);
      if(a){ mostrarAlumno(a); return; }
    }
  }
  mostrarLogin();
}

/* ---------------- LOGIN ---------------- */
function mostrarLogin(){
  menu.classList.add("hidden");
  app.innerHTML=`
    <h2>Login</h2>
    <input id="u" placeholder="Usuario">
    <input id="p" type="password" placeholder="Contraseña">
    <button id="btnLogin">Entrar</button>`;
  btnLogin.onclick = login;
}

async function login(){
  if(u.value==="admin" && p.value==="admin"){
    localStorage.setItem("sesion",JSON.stringify({tipo:"maestro"}));
    menu.classList.remove("hidden");
    mostrarDashboard();
    return;
  }

  const snap = await db.collection("alumnos").doc(u.value).get();
  if(snap.exists && snap.data().pass===p.value){
    localStorage.setItem("sesion",JSON.stringify({tipo:"alumno",usuario:u.value}));
    mostrarAlumno(snap.data());
    return;
  }
  alert("Credenciales incorrectas");
}

function logout(){
  localStorage.removeItem("sesion");
  location.reload();
}

/* ---------------- DATA ---------------- */
async function cargarTodo(){
  alumnos = (await db.collection("alumnos").get()).docs.map(d=>d.data());
  cuotas  = (await db.collection("cuotas").get()).docs.map(d=>d.data());
  egresos = (await db.collection("egresos").get()).docs.map(d=>d.data());
}

/* ---------------- UTIL ---------------- */
function calcularEstatus(a){
  if(!a.pagos || a.pagos.length===0) return "Con adeudo";
  const ultimo = a.pagos[a.pagos.length-1];
  const vencimiento = new Date(ultimo.fecha);
  vencimiento.setDate(vencimiento.getDate()+a.recurrencia);
  return new Date()<=vencimiento ? "Al corriente" : "Con adeudo";
}

/* ---------------- DASHBOARD ---------------- */
function mostrarDashboard(){
  const mes = new Date().toISOString().slice(0,7);
  let ingresos=0, gastos=0;

  alumnos.forEach(a=>{
    (a.pagos||[]).forEach(p=>{
      if(p.fecha.startsWith(mes)) ingresos+=p.monto;
    });
  });
  egresos.forEach(e=>{
    if(e.fecha.startsWith(mes)) gastos+=e.monto;
  });

  app.innerHTML=`
    <div class="card">
      <h2>Dashboard</h2>
      <p>Ingresos: $${ingresos}</p>
      <p>Egresos: $${gastos}</p>
      <p class="${ingresos-gastos>=0?'green':'red'}">
        Balance: $${ingresos-gastos}
      </p>
      <canvas id="graf"></canvas>
    </div>`;

  new Chart(document.getElementById("graf"),{
    type:"bar",
    data:{
      labels:["Ingresos","Egresos"],
      datasets:[{data:[ingresos,gastos],backgroundColor:["green","red"]}]
    }
  });
}

/* ---------------- DIRECTORIO ---------------- */
function mostrarDirectorio(){
  app.innerHTML=`
    <div class="card">
      <h2>Directorio</h2>
      <table>
        <tr><th>Nombre</th><th>Usuario</th><th>Plan</th><th>Estatus</th></tr>
        ${alumnos.map(a=>`
          <tr>
            <td>${a.nombre}</td>
            <td>${a.usuario}</td>
            <td>${a.planNombre||""}</td>
            <td>${calcularEstatus(a)}</td>
          </tr>`).join("")}
      </table>
    </div>`;
}

/* ---------------- ALTA ---------------- */
function mostrarAlta(){
  app.innerHTML=`
    <div class="card">
      <h2>Alta Alumno</h2>
      <input id="ru" placeholder="Usuario">
      <input id="rp" placeholder="Contraseña">
      <input id="rn" placeholder="Nombre">
      <input id="rl" placeholder="Nivel">
      <select id="rc">
        ${cuotas.map(c=>`<option value="${c.nombre}">${c.nombre}</option>`).join("")}
      </select>
      <input id="rr" type="number" placeholder="Recurrencia (días)">
      <button id="btnReg">Registrar</button>`;
  btnReg.onclick = registrarAlumno;
}

async function registrarAlumno(){
  const cuota = cuotas.find(c=>c.nombre===rc.value);
  await db.collection("alumnos").doc(ru.value).set({
    usuario:ru.value,
    pass:rp.value,
    nombre:rn.value,
    nivel:rl.value,
    planNombre:cuota.nombre,
    monto:cuota.monto,
    recurrencia:+rr.value,
    pagos:[]
  });
  await cargarTodo(); mostrarDirectorio();
}

/* ---------------- CUOTAS ---------------- */
function mostrarCuotas(){
  app.innerHTML=`
    <div class="card">
      <h2>Cuotas</h2>
      <input id="cn" placeholder="Nombre">
      <input id="cm" type="number" placeholder="Monto">
      <button id="btnQC">Agregar</button>
      <ul>${cuotas.map(c=>`<li>${c.nombre} - $${c.monto}</li>`).join("")}</ul>`;
  btnQC.onclick = async ()=>{
    await db.collection("cuotas").doc(cn.value).set({nombre:cn.value,monto:+cm.value});
    await cargarTodo(); mostrarCuotas();
  };
}

/* ---------------- COBRANZA ---------------- */
function mostrarCobranza(){
  app.innerHTML=alumnos.map(a=>`
    <div class="card">
      <b>${a.nombre}</b>
      <p>Estatus: ${calcularEstatus(a)}</p>
      <button onclick="pagar('${a.usuario}')">Registrar pago</button>
    </div>`).join("");
}

async function pagar(u){
  const a = alumnos.find(x=>x.usuario===u);
  a.pagos.push({fecha:new Date().toISOString(),monto:a.monto});
  await db.collection("alumnos").doc(u).set(a);
  await cargarTodo(); mostrarCobranza();
}

/* ---------------- PERFIL ALUMNO ---------------- */
function mostrarAlumno(a){
  const estatus = calcularEstatus(a);
  const ultimo = a.pagos?.[a.pagos.length-1];
  let vencimiento = "—";
  if(ultimo){
    const d=new Date(ultimo.fecha); d.setDate(d.getDate()+a.recurrencia);
    vencimiento=d.toLocaleDateString();
  }

  menu.classList.add("hidden");
  app.innerHTML=`
    <div class="card">
      <h2>${a.nombre}</h2>
      <p>Plan: ${a.planNombre} ($${a.monto})</p>
      <p>Estatus: <b>${estatus}</b></p>
      <p>Próximo vencimiento: ${vencimiento}</p>
      <p>Pagos realizados: ${(a.pagos||[]).length}</p>
      <button id="btnSalirAlumno">Salir</button>
    </div>`;
  btnSalirAlumno.onclick = logout;
}

/* ---------------- MENU ---------------- */
btnDashboard.onclick = mostrarDashboard;
btnDir.onclick = mostrarDirectorio;
btnAlta.onclick = mostrarAlta;
btnCuotas.onclick = mostrarCuotas;
btnCobranza.onclick = mostrarCobranza;
btnLogout.onclick = logout;
</script>

</body>
</html>
