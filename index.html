<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nihongo – Paso 1 Login</title>

<style>
body { font-family: Arial, sans-serif; padding:30px; background:#f5f5f5; }
button { padding:6px 10px; margin:6px 0; }
.card { background:#fff; padding:15px; border-radius:6px; max-width:400px; }
.hidden { display:none; }
nav button { margin-right:6px; }
</style>
</head>

<body>

<h1>Nihongo App</h1>

<nav id="menu" class="hidden">
  <button id="btnHome">Home</button>
  <button id="btnOut">Salir</button>
</nav>

<div id="app"></div>

<!-- ✅ Firebase BIEN cargado -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyAOcQAh7cYKhQ5EeOfmYJhzX40J-LD-nyI",
  authDomain: "nihongoapp-85125.firebaseapp.com",
  projectId: "nihongoapp-85125"
});
const db = firebase.firestore();

const app = document.getElementById("app");
const menu = document.getElementById("menu");

mostrarLogin();

function mostrarLogin(){
  menu.classList.add("hidden");
  app.innerHTML = `
    <div class="card">
      <h2>Login</h2>
      <input id="u" placeholder="Usuario"><br>
      <input id="p" type="password" placeholder="Contraseña"><br>
      <button id="go">Entrar</button>
    </div>
  `;
  document.getElementById("go").onclick = login;
}

async function login(){
  const u = document.getElementById("u").value.trim();
  const p = document.getElementById("p").value.trim();

  // Maestro
  if(u==="admin" && p==="admin"){
    localStorage.setItem("sesion", JSON.stringify({tipo:"maestro"}));
    mostrarHome("Maestro");
    return;
  }

  // Alumno
  const snap = await db.collection("alumnos").doc(u).get();
  if(snap.exists && snap.data().pass===p){
    localStorage.setItem("sesion", JSON.stringify({tipo:"alumno", usuario:u}));
    mostrarHome("Alumno");
    return;
  }

  alert("Credenciales incorrectas");
}

function mostrarHome(tipo){
  menu.classList.remove("hidden");
  app.innerHTML = `
    <div class="card">
      <h2>Bienvenido (${tipo})</h2>
      <p>Login funcionando ✅</p>
    </div>
  `;
}

document.getElementById("btnOut").onclick = () => {
  localStorage.clear();
  location.reload();
};
</script>

</body>
</html>
