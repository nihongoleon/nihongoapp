<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nihongo – Fase 5</title>

<style>
body { font-family: Arial, sans-serif; padding:30px; background:#f5f5f5; }
h1,h2 { margin-bottom:10px; }
nav { margin-bottom:15px; }
button { padding:6px 10px; margin-right:5px; }
input, select { padding:6px; width:100%; margin-bottom:6px; }
.card { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
table { width:100%; border-collapse:collapse; }
th, td { border:1px solid #ccc; padding:6px; }
.green { color:green; font-weight:bold; }
.red { color:red; font-weight:bold; }
.yellow { color:#c49b00; font-weight:bold; }
.hidden { display:none; }
</style>
</head>

<body>

<h1>Nihongo App – Fase 5</h1>

<nav id="menu" class="hidden">
  <button id="btnDash">Dashboard</button>
  <button id="btnDir">Directorio</button>
  <button id="btnAlta">Alta Alumno</button>
  <button id="btnCuotas">Modalidades</button>
  <button id="btnCobranza">Cobranza</button>
  <button id="btnEgresos">Egresos</button>
  <button id="btnLogout">Salir</button>
</nav>

<div id="app"></div>

<!-- ✅ SCRIPTS CORRECTOS (ESTO ES LA CLAVE) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
/* ================= FIREBASE ================= */
firebase.initializeApp({
  apiKey: "AIzaSyAOcQAh7cYKhQ5EeOfmYJhzX40J-LD-nyI",
  authDomain: "nihongoapp-85125.firebaseapp.com",
  projectId: "nihongoapp-85125"
});
const db = firebase.firestore();

/* ================= ESTADO ================= */
const app = document.getElementById("app");
const menu = document.getElementById("menu");
const MAESTRO = { user:"admin", pass:"admin" };

let alumnos = [];
let cuotas  = [];
let egresos = [];

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", init);

async function init(){
  alumnos = (await db.collection("alumnos").get()).docs.map(d=>d.data());
  cuotas  = (await db.collection("cuotas").get()).docs.map(d=>d.data());
  egresos = (await db.collection("egresos").get()).docs.map(d=>d.data());

  const sesion = JSON.parse(localStorage.getItem("sesion"));
  if(sesion?.tipo==="maestro"){
    menu.classList.remove("hidden");
    dashboard();
    return;
  }
  if(sesion?.tipo==="alumno"){
    const a = alumnos.find(x=>x.usuario===sesion.usuario);
    if(a){ perfilAlumno(a); return; }
  }
  loginUI();
}

/* ================= LOGIN ================= */
function loginUI(){
  menu.classList.add("hidden");
  app.innerHTML=`
    <h2>Login</h2>
    <input id="u" placeholder="Usuario">
    <input id="p" type="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>`;
}

async function login(){
  if(u.value==="admin" && p.value==="admin"){
    localStorage.setItem("sesion",JSON.stringify({tipo:"maestro"}));
    location.reload(); return;
  }
  const snap = await db.collection("alumnos").doc(u.value).get();
  if(snap.exists && snap.data().pass===p.value){
    localStorage.setItem("sesion",JSON.stringify({tipo:"alumno",usuario:u.value}));
    location.reload(); return;
  }
  alert("Credenciales incorrectas");
}

function logout(){
  localStorage.clear();
  location.reload();
}

/* ================= ESTATUS ================= */
function estatusAlumno(a){
  const pagoIns = (a.pagos||[]).find(p=>p.tipo==="inscripcion");
  if(!pagoIns) return {txt:"Pendiente de inscripción", cls:"yellow"};

  const plan = cuotas.find(c=>c.id===a.planId);
  if(plan.tipo!=="recurrente") return {txt:"Al corriente", cls:"green"};

  const ult = (a.pagos||[]).filter(p=>p.tipo==="recurrente").slice(-1)[0];
  if(!ult) return {txt:"Adeudo", cls:"red"};

  const v = new Date(ult.fecha);
  v.setDate(v.getDate()+plan.recurrenciaDias);
  return new Date()<=v ? {txt:"Al corriente", cls:"green"} : {txt:"Adeudo", cls:"red"};
}

/* ================= DASHBOARD ================= */
function dashboard(){
  let ingresos=0, gastos=0;
  alumnos.forEach(a=>(a.pagos||[]).forEach(p=>ingresos+=p.monto));
  egresos.forEach(e=>gastos+=e.monto);

  app.innerHTML=`
    <div class="card">
      <h2>Dashboard</h2>
      <p>Ingresos: $${ingresos}</p>
      <p>Egresos: $${gastos}</p>
      <p class="${ingresos-gastos>=0?'green':'red'}">Balance: $${ingresos-gastos}</p>
      <canvas id="graf"></canvas>
    </div>`;

  new Chart(document.getElementById("graf"),{
    type:"bar",
    data:{
      labels:["Ingresos","Egresos"],
      datasets:[{data:[ingresos,gastos],backgroundColor:["green","red"]}]
    }
  });
}

/* ================= DIRECTORIO ================= */
function directorio(){
  app.innerHTML=`
    <div class="card">
      <h2>Directorio</h2>
      <table>
        <tr><th>Alumno</th><th>Modalidad</th><th>Estatus</th></tr>
        ${alumnos.map(a=>{
          const e=estatusAlumno(a);
          return `<tr>
            <td>${a.nombre}</td>
            <td>${cuotas.find(c=>c.id===a.planId)?.nombre||""}</td>
            <td class="${e.cls}">${e.txt}</td>
          </tr>`;
        }).join("")}
      </table>
    </div>`;
}

/* ================= PERFIL ALUMNO ================= */
function perfilAlumno(a){
  const e = estatusAlumno(a);
  const ult = (a.pagos||[]).slice(-1)[0];
  app.innerHTML=`
    <div class="card">
      <h2>${a.nombre}</h2>
      <p class="${e.cls}">${e.txt}</p>
      ${ult?`<p>Último pago: ${ult.tipo} - $${ult.monto} (${new Date(ult.fecha).toLocaleDateString()})</p>`:""}
      <button onclick="logout()">Salir</button>
    </div>`;
}

/* ================= MENU ================= */
btnDash.onclick = dashboard;
btnDir.onclick = directorio;
btnLogout.onclick = logout;
</script>

</body>
</html>
