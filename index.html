<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nihongo – Fase 4.6.1 (CORREGIDA)</title>

<style>
body { font-family: Arial, sans-serif; padding:30px; background:#f5f5f5; }
h1,h2 { margin-bottom:10px; }
nav { margin-bottom:15px; }
button { padding:6px 10px; margin-right:5px; }
input, select { padding:6px; width:100%; margin-bottom:6px; }
.card { background:#fff; padding:15px; margin-bottom:15px; border-radius:6px; }
table { width:100%; border-collapse:collapse; }
th, td { border:1px solid #ccc; padding:6px; }
.green { color:green; font-weight:bold; }
.red { color:red; font-weight:bold; }
.yellow { color:#c49b00; font-weight:bold; }
.hidden { display:none; }
</style>
</head>

<body>

<h1>Nihongo App – Fase 4.6.1</h1>

<nav id="menu" class="hidden">
  <button onclick="dashboard()">Dashboard</button>
  <button onclick="directorio()">Directorio</button>
  <button onclick="alta()">Alta Alumno</button>
  <button onclick="cuotasUI()">Cuotas</button>
  <button onclick="cobranza()">Cobranza</button>
  <button onclick="logout()">Salir</button>
</nav>

<div id="app"></div>

<!-- ✅ SCRIPTS CORRECTOS -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyAOcQAh7cYKhQ5EeOfmYJhzX40J-LD-nyI",
  authDomain: "nihongoapp-85125.firebaseapp.com",
  projectId: "nihongoapp-85125"
});
const db = firebase.firestore();

const app = document.getElementById("app");
const menu = document.getElementById("menu");
const MAESTRO = { user:"admin", pass:"admin" };

let alumnos = [];
let cuotas  = [];

document.addEventListener("DOMContentLoaded", init);

async function init(){
  alumnos = (await db.collection("alumnos").get()).docs.map(d=>d.data());
  cuotas  = (await db.collection("cuotas").get()).docs.map(d=>d.data());

  const s = JSON.parse(localStorage.getItem("sesion"));
  if(s?.tipo==="maestro"){
    menu.classList.remove("hidden");
    dashboard(); return;
  }
  if(s?.tipo==="alumno"){
    const a = alumnos.find(x=>x.usuario===s.usuario);
    if(a){ perfilAlumno(a); return; }
  }
  loginUI();
}

/* LOGIN */
function loginUI(){
  app.innerHTML=`
    <h2>Login</h2>
    <input id="u" placeholder="Usuario">
    <input id="p" type="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>`;
}

async function login(){
  if(u.value===MAESTRO.user && p.value===MAESTRO.pass){
    localStorage.setItem("sesion",JSON.stringify({tipo:"maestro"}));
    location.reload(); return;
  }
  const snap = await db.collection("alumnos").doc(u.value).get();
  if(snap.exists && snap.data().pass===p.value){
    localStorage.setItem("sesion",JSON.stringify({tipo:"alumno",usuario:u.value}));
    location.reload(); return;
  }
  alert("Credenciales incorrectas");
}

function logout(){ localStorage.clear(); location.reload(); }

/* ESTATUS */
function estatus(a){
  const insPago = (a.pagos||[]).find(p=>p.tipo==="inscripcion");
  if(!insPago) return {t:"Pendiente de inscripción",c:"yellow"};

  const plan = cuotas.find(c=>c.id===a.planId);
  if(plan.tipo!=="recurrente") return {t:"Al corriente",c:"green"};

  const ult = (a.pagos||[]).filter(p=>p.tipo==="recurrente").slice(-1)[0];
  if(!ult) return {t:"Adeudo",c:"red"};

  const v = new Date(ult.fecha);
  v.setDate(v.getDate()+plan.recurrencia);
  return new Date()<=v ? {t:"Al corriente",c:"green"} : {t:"Adeudo",c:"red"};
}

/* DASHBOARD */
function dashboard(){
  let ingresos=0;
  alumnos.forEach(a=>(a.pagos||[]).forEach(p=>ingresos+=p.monto));
  app.innerHTML=`<div class="card"><h2>Ingresos: $${ingresos}</h2></div>`;
}

/* DIRECTORIO */
function directorio(){
  app.innerHTML=`<div class="card"><table>
    <tr><th>Alumno</th><th>Plan</th><th>Estatus</th></tr>
    ${alumnos.map(a=>{
      const e=estatus(a);
      return `<tr>
        <td>${a.nombre}</td>
        <td>${cuotas.find(c=>c.id===a.planId)?.nombre||""}</td>
        <td class="${e.c}">${e.t}</td>
      </tr>`;
    }).join("")}
  </table></div>`;
}

/* ALTA */
function alta(){
  app.innerHTML=`<div class="card">
    <input id="ru" placeholder="Usuario">
    <input id="rp" placeholder="Contraseña">
    <input id="rn" placeholder="Nombre">
    <select id="rIns">${cuotas.filter(c=>c.tipo==="inscripcion").map(c=>`<option value="${c.id}">${c.nombre}</option>`)}</select>
    <select id="rPlan">${cuotas.filter(c=>c.tipo!=="inscripcion").map(c=>`<option value="${c.id}">${c.nombre}</option>`)}</select>
    <button onclick="registrar()">Registrar</button>
  </div>`;
}

async function registrar(){
  await db.collection("alumnos").doc(ru.value).set({
    usuario:ru.value,
    pass:rp.value,
    nombre:rn.value,
    inscripcionId:rIns.value,
    planId:rPlan.value,
    pagos:[]
  });
  location.reload();
}

/* CUOTAS */
function cuotasUI(){
  app.innerHTML=`<div class="card">
    <input id="cn" placeholder="Nombre">
    <input id="cm" type="number" placeholder="Monto">
    <select id="ct">
      <option value="inscripcion">Inscripción</option>
      <option value="recurrente">Recurrente</option>
      <option value="unica">Única</option>
    </select>
    <input id="cr" type="number" placeholder="Recurrencia">
    <button onclick="crearCuota()">Agregar</button>
  </div>`;
}

async function crearCuota(){
  const id=cn.value.toLowerCase().replace(/\s/g,"_");
  await db.collection("cuotas").doc(id).set({
    id, nombre:cn.value, monto:+cm.value, tipo:ct.value, recurrencia:+cr.value||0
  });
  location.reload();
}

/* COBRANZA */
function cobranza(){
  app.innerHTML=alumnos.map(a=>{
    const e=estatus(a);
    return `<div class="card">
      <b>${a.nombre}</b>
      <p class="${e.c}">${e.t}</p>
      <button onclick="pagar('${a.usuario}')">Registrar pago</button>
    </div>`;
  }).join("");
}

async function pagar(u){
  const a=alumnos.find(x=>x.usuario===u);
  if(!(a.pagos||[]).find(p=>p.tipo==="inscripcion")){
    const c=cuotas.find(x=>x.id===a.inscripcionId);
    a.pagos.push({tipo:"inscripcion",fecha:new Date().toISOString(),monto:c.monto});
  }else{
    const p=cuotas.find(x=>x.id===a.planId);
    if(p.tipo==="recurrente"){
      a.pagos.push({tipo:"recurrente",fecha:new Date().toISOString(),monto:p.monto});
    }
  }
  await db.collection("alumnos").doc(u).set(a);
  location.reload();
}

/* PERFIL ALUMNO */
function perfilAlumno(a){
  const e=estatus(a);
  app.innerHTML=`<div class="card">
    <h2>${a.nombre}</h2>
    <p class="${e.c}">${e.t}</p>
    <p>Pagos: ${(a.pagos||[]).length}</p>
    <button onclick="logout()">Salir</button>
  </div>`;
}
</script>

</body>
</html>
