<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nihongo – Fase 5 (CORREGIDA)</title>

<style>
body { font-family: Arial; padding:30px; background:#f5f5f5; }
nav { margin-bottom:15px; }
button { padding:6px 10px; margin-right:6px; }
input, select { padding:6px; width:100%; margin-bottom:6px; }
.card { background:#fff; padding:15px; margin-bottom:12px; border-radius:6px; }
table { width:100%; border-collapse:collapse; }
th,td { border:1px solid #ccc; padding:6px; }
.green{color:green;font-weight:bold}
.red{color:red;font-weight:bold}
.yellow{color:#c49b00;font-weight:bold}
.hidden{display:none}
small{color:#666}
</style>
</head>

<body>

<h1>Nihongo App – Fase 5</h1>

<nav id="menu" class="hidden">
  <button id="btnDash">Dashboard</button>
  <button id="btnDir">Directorio</button>
  <button id="btnAlta">Alta Alumno</button>
  <button id="btnMods">Modalidades</button>
  <button id="btnCob">Cobranza</button>
  <button id="btnEgr">Egresos</button>
  <button id="btnOut">Salir</button>
</nav>

<div id="app"></div>

<!-- ✅ SCRIPTS REALES -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
/* ===== FIREBASE ===== */
firebase.initializeApp({
  apiKey: "AIzaSyAOcQAh7cYKhQ5EeOfmYJhzX40J-LD-nyI",
  authDomain: "nihongoapp-85125.firebaseapp.com",
  projectId: "nihongoapp-85125"
});
const db = firebase.firestore();

/* ===== ESTADO ===== */
const app = document.getElementById("app");
const menu = document.getElementById("menu");
const MAESTRO = { user:"admin", pass:"admin" };
let alumnos=[], modalidades=[], egresos=[];

/* ===== ARRANQUE ===== */
document.addEventListener("DOMContentLoaded", init);

async function init(){
  await cargarTodo();
  const s = JSON.parse(localStorage.getItem("sesion"));
  if(!s){ loginUI(); return; }
  if(s.tipo==="maestro"){ menu.classList.remove("hidden"); dashboard(); return; }
  if(s.tipo==="alumno"){
    const a = alumnos.find(x=>x.usuario===s.usuario);
    if(a){ perfilAlumno(a); return; }
  }
  loginUI();
}

/* ===== LOGIN ===== */
function loginUI(){
  menu.classList.add("hidden");
  app.innerHTML=`
    <div class="card">
      <h2>Login</h2>
      <input id="u" placeholder="Usuario">
      <input id="p" type="password" placeholder="Contraseña">
      <button id="go">Entrar</button>
    </div>`;
  go.onclick = login;
}
async function login(){
  if(u.value===MAESTRO.user && p.value===MAESTRO.pass){
    localStorage.setItem("sesion",JSON.stringify({tipo:"maestro"}));
    init(); return;
  }
  const snap = await db.collection("alumnos").doc(u.value).get();
  if(snap.exists && snap.data().pass===p.value){
    localStorage.setItem("sesion",JSON.stringify({tipo:"alumno",usuario:u.value}));
    init(); return;
  }
  alert("Credenciales incorrectas");
}
function logout(){ localStorage.clear(); location.reload(); }

/* ===== DATA ===== */
async function cargarTodo(){
  alumnos = (await db.collection("alumnos").get()).docs.map(d=>d.data());
  modalidades = (await db.collection("modalidades").get()).docs.map(d=>d.data());
  egresos = (await db.collection("egresos").get()).docs.map(d=>({...d.data(), _id:d.id}));
}

/* ===== ESTATUS ===== */
function estatus(a){
  const pagoIns = (a.pagos||[]).find(p=>p.tipo==="inscripcion");
  if(!pagoIns) return {t:"Pendiente de inscripción",c:"yellow"};

  const mod = modalidades.find(m=>m.id===a.modId);
  if(!mod || mod.tipo!=="recurrente") return {t:"Al corriente",c:"green"};

  const ult = (a.pagos||[]).filter(p=>p.tipo==="recurrente").slice(-1)[0];
  if(!ult) return {t:"Adeudo",c:"red"};

  const v = new Date(ult.fecha); v.setDate(v.getDate()+mod.recurrenciaDias);
  return (new Date()<=v)?{t:"Al corriente",c:"green"}:{t:"Adeudo",c:"red"};
}

/* ===== DASHBOARD ===== */
function dashboard(){
  let ing=0, eg=0;
  alumnos.forEach(a=>(a.pagos||[]).forEach(p=>ing+=p.monto));
  egresos.forEach(e=>eg+=e.monto);
  app.innerHTML=`
   <div class="card">
     <h2>Dashboard</h2>
     <p>Ingresos: $${ing}</p>
     <p>Egresos: $${eg}</p>
     <canvas id="c"></canvas>
   </div>`;
  new Chart(c,{type:"bar",data:{labels:["Ing","Egr"],datasets:[{data:[ing,eg]}]}});}

/* ===== DIRECTORIO ===== */
function directorio(){
  app.innerHTML=`
   <div class="card"><h2>Directorio</h2>
   <table><tr><th>Nombre</th><th>Modalidad</th><th>Estatus</th><th>Editar</th></tr>
   ${alumnos.map(a=>{
     const e=estatus(a);
     return `<tr>
       <td>${a.nombre}</td>
       <td>${modalidades.find(m=>m.id===a.modId)?.nombre||""}</td>
       <td class="${e.c}">${e.t}</td>
       <td><button onclick="edit('${a.usuario}')">Editar</button></td>
     </tr>`}).join("")}
   </table></div>`;
}
function edit(u){
  const a=alumnos.find(x=>x.usuario===u);
  app.innerHTML=`
   <div class="card">
     <h2>Editar Alumno</h2>
     <input id="rn" value="${a.nombre}">
     <select id="rm">${modalidades.map(m=>`<option ${m.id===a.modId?"selected":""} value="${m.id}">${m.nombre}</option>`)}</select>
     <button onclick="save('${u}')">Guardar</button>
   </div>`;
}
async function save(u){
  await db.collection("alumnos").doc(u).set({nombre:rn.value,modId:rm.value},{merge:true});
  init();
}

/* ===== ALTA ===== */
function alta(){
  app.innerHTML=`
   <div class="card">
     <h2>Alta Alumno</h2>
     <input id="ru" placeholder="Usuario">
     <input id="rp" placeholder="Password">
     <input id="rn" placeholder="Nombre">
     <select id="rm">${modalidades.filter(m=>m.tipo!="inscripcion").map(m=>`<option value="${m.id}">${m.nombre}</option>`)}</select>
     <button onclick="altaGo()">Crear</button>
   </div>`;
}
async function altaGo(){
  await db.collection("alumnos").doc(ru.value).set({usuario:ru.value,pass:rp.value,nombre:rn.value,modId:rm.value,pagos:[]});
  init();
}

/* ===== MODALIDADES ===== */
function mods(){
  app.innerHTML=`
   <div class="card">
     <h2>Modalidades</h2>
     <input id="mn" placeholder="Nombre">
     <input id="mm" type="number" placeholder="Monto">
     <select id="mt"><option value="recurrente">Recurrente</option><option value="unica">Única</option></select>
     <input id="mr" type="number" placeholder="Recurrencia días">
     <button onclick="modGo()">Agregar</button>
   </div>`;
}
async function modGo(){
  const id=mn.value.toLowerCase().replace(/\s/g,"_");
  await db.collection("modalidades").doc(id).set({id,nombre:mn.value,monto:+mm.value,tipo:mt.value,recurrenciaDias:+mr.value||0});
  init();
}

/* ===== COBRANZA ===== */
function cob(){
  app.innerHTML=alumnos.map(a=>{
    const e=estatus(a);
    const mod=modalidades.find(m=>m.id===a.modId);
    const pendienteIns = !(a.pagos||[]).some(p=>p.tipo==="inscripcion");
    const vencido = e.t==="Adeudo";
    const puede = pendienteIns || (mod?.tipo==="recurrente" && vencido);
    return `
     <div class="card">
       <b>${a.nombre}</b>
       <p class="${e.c}">${e.t}</p>
       ${puede?`<button onclick="pagar('${a.usuario}')">Registrar pago</button>`:`<small>Sin pagos pendientes</small>`}
     </div>`;
  }).join("");
}
async function pagar(u){
  const a=alumnos.find(x=>x.usuario===u);
  if(!(a.pagos||[]).some(p=>p.tipo==="inscripcion")){
    a.pagos.push({tipo:"inscripcion",fecha:new Date().toISOString(),monto:500});
  }else{
    const m=modalidades.find(x=>x.id===a.modId);
    a.pagos.push({tipo:"recurrente",fecha:new Date().toISOString(),monto:m.monto});
  }
  await db.collection("alumnos").doc(u).set(a);
  init();
}

/* ===== EGRESOS ===== */
function egs(){
  app.innerHTML=`
   <div class="card">
     <h2>Egresos</h2>
     <input id="ec" placeholder="Concepto">
     <input id="em" type="number" placeholder="Monto">
     <button onclick="egAdd()">Agregar</button>
     <ul>${egresos.map(e=>`<li>${e.concepto} $${e.monto}</li>`).join("")}</ul>
   </div>`;
}
async function egAdd(){ await db.collection("egresos").add({concepto:ec.value,monto:+em.value}); init(); }

/* ===== PERFIL ALUMNO ===== */
function perfilAlumno(a){
  const e=estatus(a);
  const ult=(a.pagos||[]).slice(-1)[0];
  app.innerHTML=`
   <div class="card">
     <h2>${a.nombre}</h2>
     <p class="${e.c}">${e.t}</p>
     ${ult?`<p>Último: ${ult.tipo} $${ult.monto}</p>`:""}
     <button onclick="logout()">Salir</button>
   </div>`;
}

/* ===== MENU ===== */
btnDash.onclick=dashboard;
btnDir.onclick=directorio;
btnAlta.onclick=alta;
btnMods.onclick=mods;
btnCob.onclick=cob;
btnEgr.onclick=egs;
btnOut.onclick=logout;
</script>

</body>
</html>
