  <button onclick="logout()">Salir</button>
</nav>

<div id="app">Cargando…</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAOcQAh7cYKhQ5EeOfmYJhzX40J-LD-nyI",
  authDomain: "nihongoapp-85125.firebaseapp.com",
  projectId: "nihongoapp-85125",
};

const fb = initializeApp(firebaseConfig);
const db = getFirestore(fb);
const app = document.getElementById("app");
const menu = document.getElementById("menu");

const MAESTRO = { user: "admin", pass: "admin" };
let alumnos = [];

function hoy(){ return new Date().toISOString().slice(0,10); }
function sumar30(){ let d=new Date(); d.setDate(d.getDate()+30); return d.toISOString().slice(0,10); }
function activo(f){ return new Date()<=new Date(f); }
function mesActual(fecha){ return fecha.slice(0,7)===hoy().slice(0,7); }

/* LOGIN */
login();
function login(){
  app.innerHTML = `
    <h2>Login</h2>
    <input id="u" placeholder="Usuario">
    <input id="p" type="password" placeholder="Contraseña">
    <button id="go">Entrar</button>
  `;
  document.getElementById("go").onclick = async ()=>{
    if(u.value===MAESTRO.user && p.value===MAESTRO.pass){
      menu.classList.remove("hidden");
      cargar();
      vista("dashboard");
      return;
    }
    const ref = doc(db,"alumnos",u.value);
    const snap = await getDoc(ref);
    if(!snap.exists() || snap.data().pass!==p.value){
      alert("Credenciales incorrectas");
      return;
    }
    mostrarAlumno(snap.data());
  }
}

function logout(){ location.reload(); }

/* CARGA */
async function cargar(){
  const snap = await getDocs(collection(db,"alumnos"));
  alumnos = snap.docs.map(d=>d.data());
}

/* VISTAS */
window.vista = function(v){
  if(v==="alumnos"){
    app.innerHTML = `
      <div class="card">
        <h3>Registrar Alumno</h3>
        <input id="ru" placeholder="Usuario">
        <input id="rp" placeholder="Contraseña">
        <input id="rn" placeholder="Nombre">
        <input id="rl" placeholder="Nivel">
        <button onclick="registrarAlumno()">Registrar</button>
      </div>
    `;
  }

  if(v==="cobranza"){
    app.innerHTML="";
    alumnos.forEach(a=>{
      const d=document.createElement("div");
      d.className="card";
      d.innerHTML=`
        <b>${a.nombre}</b><br>
        Estado: ${activo(a.vencimiento)?'<span class=ok>Activo</span>':'<span class=bad>Suspendido</span>'}<br>
        Vence: ${a.vencimiento}
        <button>Registrar Pago</button>
      `;
      d.querySelector("button").onclick=async()=>{
        a.vencimiento=sumar30();
        a.pagos.push({fecha:hoy(),monto:1200});
        await setDoc(doc(db,"alumnos",a.usuario),a);
        cargar(); vista("cobranza");
      }
      app.appendChild(d);
    });
  }

  if(v==="agenda"){
    app.innerHTML="";
    alumnos.forEach(a=>{
      app.innerHTML+=`
      <div class=card>
        <b>${a.nombre}</b><br>
        Grupo Teams: <a href="${a.teams||'#'}"{a.clase||"No asignada"}
      </div>`;
    });
  }

  if(v==="dashboard"){
    let ing=0, eg=0;
    alumnos.forEach(a=>a.pagos.forEach(p=>{ if(mesActual(p.fecha)) ing+=p.monto; }));
    const balance=ing-eg;
    app.innerHTML=`
      <div class="card">
        <h2>Ingresos: $${ing}</h2>
        <h2>Egresos: $${eg}</h2>
        <h1 class="${balance>=0?'ok':'bad'}">Balance: $${balance}</h1>
        <canvas id="graf"></canvas>
      </div>
    `;
    new Chart(document.getElementById("graf"),{
      type:"bar",
      data:{ labels:["Ingresos","Egresos"], datasets:[{data:[ing,eg], backgroundColor:["green","red"]}]}
    });
  }
}

window.registrarAlumno = async function(){
  const a={
    usuario:ru.value, pass:rp.value, nombre:rn.value,
    nivel:rl.value, vencimiento:sumar30(), pagos:[]
  };
  await setDoc(doc(db,"alumnos",ru.value),a);
  cargar(); vista("alumnos");
}

function mostrarAlumno(a){
  app.innerHTML=`
    <div class="card">
      <h2>${a.nombre}</h2>
      Estado: ${activo(a.vencimiento)?'<span class=ok>Activo</span>':'<span class=bad>Suspendido</span>'}<br>
      ${activo(a.vencimiento)?'':'<p class=bad>Cuenta suspendida por pagos pendientes</p>'}
      <button onclick="logout()">Salir</button>
    </div>
  `;
}

</script>
</body>
</html>
